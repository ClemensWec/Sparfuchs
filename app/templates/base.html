<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#1A3A32" />
    <link rel="manifest" href="/static/manifest.json" />
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>{% block title %}Sparfuchs{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}?v=20260322b" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand-lockup" href="/">
          <span class="brand-mark">SF</span>
          <span class="brand-copy">
            <strong>Sparfuchs</strong>
          </span>
        </a>
      </header>
      <main class="site-frame">
        {% block content %}{% endblock %}
      </main>
    </div>

    <script src="{{ url_for('static', path='app.js') }}?v=20260322b"></script>
  </body>
</html>
